<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Vibrasi Motor Listrik - Tugas Akhir</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card-stat {
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            color: #fff;
        }
        .bg-ax { background-color: #0d6efd; }
        .bg-ay { background-color: #198754; }
        .bg-az { background-color: #ffc107; color: #000 !important; }
        .bg-rms { background-color: #dc3545; }
        
        .card-main {
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            background-color: #fff;
            margin-bottom: 20px;
        }
        .card-header-custom {
            background-color: #f8f9fa;
            border-bottom: 1px solid #edf2f9;
            padding: 12px 20px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #495057;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
        }
        .status-badge {
            font-size: 2rem;
            font-weight: 700;
        }
        .text-normal { color: #198754; }
        .text-warning { color: #ffc107; }
        .text-danger { color: #dc3545; }
    </style>
</head>
<body>

<div class="container my-4">
    <div class="d-flex align-items-center justify-content-center my-4">
        <img src="logo.png" alt="Logo" class="me-3" style="height: 60px; width: auto; object-fit: contain;" onerror="this.style.display='none'">
        <h2 class="fw-bold text-dark m-0">Monitoring Vibrasi Motor Listrik</h2>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card card-stat bg-ax p-3 text-center">
                <div class="fw-semibold small mb-1">AX</div>
                <h2 class="fw-bold m-0" id="val-ax">0.00</h2>
                <div class="small opacity-75 mt-1">g</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card card-stat bg-ay p-3 text-center">
                <div class="fw-semibold small mb-1">AY</div>
                <h2 class="fw-bold m-0" id="val-ay">0.00</h2>
                <div class="small opacity-75 mt-1">g</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card card-stat bg-az p-3 text-center">
                <div class="fw-semibold small mb-1">AZ</div>
                <h2 class="fw-bold m-0" id="val-az">0.00</h2>
                <div class="small opacity-75 mt-1">g</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card card-stat bg-rms p-3 text-center">
                <div class="fw-semibold small mb-1">RMS</div>
                <h2 class="fw-bold m-0" id="val-rms">0.000000</h2>
                <div class="small opacity-75 mt-1">mm/s</div>
            </div>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-6">
            <div class="card card-main">
                <div class="card-header-custom">Status Motor</div>
                <div class="card-body text-center py-4">
                    <div id="motor-status" class="status-badge text-normal">-</div>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card card-main">
                <div class="card-header-custom">Waktu Data Terakhir</div>
                <div class="card-body text-center py-4">
                    <h3 class="fw-semibold text-secondary" id="last-time">-</h3>
                </div>
            </div>
        </div>
    </div>

    <div class="card card-main mb-4">
        <div class="card-header-custom">Grafik RMS Realtime</div>
        <div class="card-body">
            <div style="position: relative; height:350px; width:100%">
                <canvas id="chart-rms"></canvas>
            </div>
        </div>
    </div>

    <div class="card card-main mb-4">
        <div class="card-header-custom">Data Sensor Terakhir</div>
        <div class="table-responsive">
            <table class="table table-bordered m-0 align-middle">
                <tbody>
                    <tr>
                        <td class="fw-bold bg-light" style="width: 30%;">AX</td>
                        <td id="tbl-ax">0.00</td>
                    </tr>
                    <tr>
                        <td class="fw-bold bg-light">AY</td>
                        <td id="tbl-ay">0.00</td>
                    </tr>
                    <tr>
                        <td class="fw-bold bg-light">AZ</td>
                        <td id="tbl-az">0.00</td>
                    </tr>
                    <tr>
                        <td class="fw-bold bg-light">RMS</td>
                        <td id="tbl-rms">0.000000</td>
                    </tr>
                    <tr>
                        <td class="fw-bold bg-light">Status</td>
                        <td id="tbl-status" class="fw-semibold">-</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="text-center d-flex flex-wrap justify-content-center gap-2 mb-5">
        <button class="btn btn-success" onclick="downloadExcel('harian')"><i class="fa-solid fa-file-excel me-2"></i>Download Harian</button>
        <button class="btn btn-primary" onclick="downloadExcel('mingguan')"><i class="fa-solid fa-file-excel me-2"></i>Download Mingguan</button>
        <button class="btn btn-warning text-dark" onclick="downloadExcel('bulanan')"><i class="fa-solid fa-folder-open me-2"></i>Download Bulanan</button>
        <button class="btn btn-danger" onclick="downloadExcel('tahunan')"><i class="fa-solid fa-square-poll-vertical me-2"></i>Download Tahunan</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script>
    // 1. KONFIGURASI FIREBASE (GANTI SESUAI DENGAN KUNCI PROYEK ANDA)
    const firebaseConfig = {
        apiKey: "AIzaSyD3LlOLeNIenL2btxg9W_zX21jdKRVmbf4", 
        databaseURL: "https://dht22-b2230-default-rtdb.asia-southeast1.firebasedatabase.app" 
    };

    // Inisialisasi Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Array tampungan untuk menyimpan riwayat log data getaran selama dashboard dibuka
    let dataLogStorage = [];

    // 2. INSIALISASI GRAFIK REALTIME (CHART.JS)
    const ctx = document.getElementById('chart-rms').getContext('2d');
    const maxDataPoints = 20; 
    
    const rmsChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [], 
            datasets: [{
                label: 'RMS Vibrasi',
                data: [],
                borderColor: '#0d6efd',
                backgroundColor: 'rgba(13, 110, 253, 0.05)',
                borderWidth: 2,
                fill: true,
                tension: 0.3,
                pointRadius: 2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: { grid: { display: false } },
                y: { min: 0, max: 2.0 }
            }
        }
    });

    let dataIndex = 112;

    // 3. MEMBACA DATA DARI FIREBASE SECARA REAL-TIME
    database.ref('/Vibrasi').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            const ax = data.rmsX || 0;
            const ay = data.rmsY || 0;
            const az = data.rmsZ || 0;
            const rms = data.totalRMS || 0;
            const kondisi = data.kondisi || "-";

            // Update Angka di Grid Atas
            document.getElementById('val-ax').innerText = ax.toFixed(2);
            document.getElementById('val-ay').innerText = ay.toFixed(2);
            document.getElementById('val-az').innerText = az.toFixed(2);
            document.getElementById('val-rms').innerText = rms.toFixed(6);

            // Update Nilai di Tabel Bawah
            document.getElementById('tbl-ax').innerText = ax.toFixed(2);
            document.getElementById('tbl-ay').innerText = ay.toFixed(2);
            document.getElementById('tbl-az').innerText = az.toFixed(2);
            document.getElementById('tbl-rms').innerText = rms.toFixed(6);
            document.getElementById('tbl-status').innerText = kondisi;

            // Update Teks Status Kondisi Motor & Warna Badge
            const statusBox = document.getElementById('motor-status');
            statusBox.innerText = kondisi;
            statusBox.className = "status-badge"; 
            
            if(kondisi === "NORMAL") {
                statusBox.classList.add("text-normal");
                document.getElementById('tbl-status').className = "fw-semibold text-success";
            } else if(kondisi === "WARNING") {
                statusBox.classList.add("text-warning");
                document.getElementById('tbl-status').className = "fw-semibold text-warning";
            } else {
                statusBox.classList.add("text-danger");
                document.getElementById('tbl-status').className = "fw-semibold text-danger";
            }

            // Get Waktu Browser Laptop
            const sekarang = new Date();
            const formatWaktu = sekarang.getFullYear() + "-" + 
                String(sekarang.getMonth() + 1).padStart(2, '0') + "-" + 
                String(sekarang.getDate()).padStart(2, '0') + " " + 
                String(sekarang.getHours()).padStart(2, '0') + ":" + 
                String(sekarang.getMinutes()).padStart(2, '0') + ":" + 
                String(sekarang.getSeconds()).padStart(2, '0');
            
            document.getElementById('last-time').innerText = formatWaktu;

            // Masukkan data baru ke dalam log penyimpanan lokal (untuk diunduh ke Excel)
            dataLogStorage.push({
                "No Indeks": dataIndex,
                "Waktu Ambil": formatWaktu,
                "Nilai AX (g)": ax.toFixed(2),
                "Nilai AY (g)": ay.toFixed(2),
                "Nilai AZ (g)": az.toFixed(2),
                "Total RMS (mm/s)": rms.toFixed(6),
                "Status Motor": kondisi
            });

            // Update Pergerakan Grafik Realtime
            rmsChart.data.labels.push(dataIndex++);
            rmsChart.data.datasets[0].data.push(rms);

            if (rmsChart.data.labels.length > maxDataPoints) {
                rmsChart.data.labels.shift();
                rmsChart.data.datasets[0].data.shift();
            }
            rmsChart.update();
        }
    });

    // 4. FUNGSI UNTUK GENERATE & DOWNLOAD EXCEL
    function downloadExcel(tipe) {
        if (dataLogStorage.length === 0) {
            alert("Belum ada data masuk dari alat ESP32 untuk diunduh!");
            return;
        }

        // Membuat worksheet baru dari data log penyimpanan
        const worksheet = XLSX.utils.json_to_sheet(dataLogStorage);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Data Vibrasi");

        // Set nama file dinamis berdasarkan tombol yang diklik
        const namaFile = "Log_Vibrasi_" + tipe.toUpperCase() + "_" + new Date().toISOString().slice(0,10) + ".xlsx";

        // Eksekusi download file Excel ke komputer/HP
        XLSX.writeFile(workbook, namaFile);
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
